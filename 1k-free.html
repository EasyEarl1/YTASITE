  <script>
    // Hide the loader as soon as Klaviyo injects the form UI.
    document.addEventListener("DOMContentLoaded", function () {
      var wrapper = document.querySelector(".klaviyo-form-Wh3Vku");
      var loader = document.querySelector(".klaviyo-loading");
      if (!wrapper || !loader) return;

      function hideLoader() {
        loader.style.display = "none";
      }

      // If it loads instantly, hide right away.
      if (wrapper.children && wrapper.children.length > 0) hideLoader();

      var obs = new MutationObserver(function () {
        if (wrapper.children && wrapper.children.length > 0) {
          hideLoader();
          obs.disconnect();
        }
      });

      obs.observe(wrapper, { childList: true, subtree: true });

      // Safety: hide after 10s even if injection fails.
      setTimeout(function () {
        hideLoader();
        obs.disconnect();
      }, 10000);
    });

    // After a successful Klaviyo submit, go to the $27 upsell.

      var upsellPath = "/20-search-niches.html";
      var navigated = false;
      window.addEventListener("klaviyoForms", function (e) {
        if (navigated || !e.detail || e.detail.type !== "submit") return;
        navigated = true;
        window.location.assign(upsellPath);
